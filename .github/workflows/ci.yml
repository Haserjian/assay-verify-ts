name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      # Corpus lives in the assay repo — check it out before tests
      - uses: actions/checkout@v4
        with:
          repository: Haserjian/assay
          path: assay-corpus
          sparse-checkout: tests/contracts/vectors

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run conformance tests against corpus
        env:
          ASSAY_VECTORS_DIR: ${{ github.workspace }}/assay-corpus/tests/contracts/vectors
        run: npm test
